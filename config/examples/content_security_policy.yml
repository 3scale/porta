base: &default
  enabled: true
  report_only: false

  # Permissive default policy - same as when CSP is disabled
  # Allows everything to prevent breaking changes when deploying
  # Override in specific environments to tighten security
  policy:
    default_src: ["*", "data:", "mediastream:", "blob:", "filesystem:", "ws:", "wss:", "'unsafe-eval'", "'unsafe-inline'"]

development:
  <<: *default
  enabled: false

test:
  <<: *default
  enabled: false

production:
  <<: *default
  enabled: true
