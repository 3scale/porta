base: &default
  url: "<%= ENV.fetch('BACKEND_REDIS_URL', 'redis://localhost:6379/6') %>"
  timeout: <%= ENV.fetch('BACKEND_REDIS_TIMEOUT', 1) %>
  size: <%= ENV.fetch('RAILS_MAX_THREADS', 5) %>
  pool_timeout: 5 # this is in seconds
  sentinels: "<%= ENV['BACKEND_REDIS_SENTINEL_HOSTS'] %>"
  name: <%= ENV['BACKEND_REDIS_SENTINEL_NAME'] %>
  role: <%= ENV['BACKEND_REDIS_SENTINEL_ROLE'] %>
  # == ACL Params ==
  username: <%= ENV['BACKEND_REDIS_USERNAME'] %>
  password: <%= ENV['BACKEND_REDIS_PASSWORD'] %>
  # == TLS Params ==
  ssl_params:
    ca_file: <%= ENV['BACKEND_REDIS_TLS_CA_FILE'] %>
    cert: <%= ENV['BACKEND_REDIS_TLS_CERT'] %>
    key: <%= ENV['BACKEND_REDIS_TLS_KEY'] %>

development:
  <<: *default

test:
  <<: *default
  db: <%= 2 + ENV['TEST_ENV_NUMBER'].to_i %>

production:
  <<: *default
  url: "<%= ENV.fetch('BACKEND_REDIS_URL', 'redis://localhost:6379/15') %>"
