config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/.yarn/**",
  "**/build/**",
  "**/cache/**",
  "**/config/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/extern/**",
  "**/external/**",
  "**/generated/**",
  "**/seed/**",
  "**/target/**",
  "**/testdata/**",
  "**/node_modules/**",
  "**/vendor/**",
  "app/assets/images/**/*",
  "app/javascript",
  "assets/bundles/*.js",
  "lib/developer_portal/app/assets/stylesheets/**/*",
  "lib/developer_portal/app/views/developer_portal/css/*",
  "lib/developer_portal/app/views/developer_portal/javascripts/*",
  "public/**",
  # "spec/**/*",
  # "spec/**/**/*",
  # "test/**/*",
  # "tmp/**/*",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

[smells.boolean_logic]
threshold = 4

[smells.file_complexity]
threshold = 55

[smells.return_statements]
threshold = 4

[smells.nested_control_flow]
threshold = 4

[smells.function_parameters]
threshold = 4

[smells.function_complexity]
threshold = 5

[smells.duplication]
threshold = 22

[[source]]
default = true
name = "default"

[[plugin]]
name = "brakeman"

[[plugin]]
name = "coffeelint"

[[plugin]]
name = "eslint"

[[plugin]]
name = "reek"

[[plugin]]
name = "rubocop"

[[plugin]]
name = "shellcheck"

[[plugin]]
name = "stylelint"
